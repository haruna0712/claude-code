# pre-commit hooks (P0-12)
#
# 使い方:
#   pipx install pre-commit   # 初回のみ
#   pre-commit install         # リポジトリ直下で一度実行すれば commit ごとに自動起動
#   pre-commit run --all-files # すべてのファイルに対して手動実行
#
# CI でも `.github/workflows/ci.yml` (P0-11) から `pre-commit run --all-files`
# を呼ぶことで、ローカルで回し忘れた場合でも PR 時に検知できる。
# See: https://pre-commit.com/

default_language_version:
  python: python3.12
  node: "20.11.0"

default_stages: [pre-commit]

repos:
  # --- General hygiene ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(client/package-lock\.json|client/cache/|plugins/)
      - id: end-of-file-fixer
        exclude: ^(client/package-lock\.json|client/cache/|plugins/)
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
        # devcontainer.json は JSONC (JSON with Comments) 仕様で // コメントが
        # 公式に許容されている。check-json は plain JSON しか parse できないので除外。
        exclude: ^(client/cache/|\.devcontainer/devcontainer\.json$)
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
        exclude: ^(demo\.gif|client/package-lock\.json)$
      - id: check-merge-conflict
      - id: check-executables-have-shebangs
        exclude: ^plugins/ # 外部プラグインの shebang は上流管理
      - id: check-shebang-scripts-are-executable
        exclude: ^plugins/
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: ^client/cache/

  # --- Python (Django backend) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      # lint + auto-fix (replaces flake8 / isort / pyupgrade)
      - id: ruff
        args: [--fix]
      # format (replaces black)
      - id: ruff-format

  # --- JavaScript / TypeScript / CSS / Markdown (client & docs) ---
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, css, scss, json, yaml, markdown]
        additional_dependencies:
          - prettier@3.3.3 # pin to latest stable 3.x
        # 除外対象:
        #   - client/package-lock.json, .next/ — ビルド成果物
        #   - docs/adr/*.md — ADR 表形式は手動維持
        #   - .claude/, .claude-plugin/, .devcontainer/, .vscode/, .serena/ — エディタ/ツール設定
        #   - plugins/ — 外部プラグイン (上流管理)
        #   - .github/workflows/*claude*.yml — Claude Code の fork 由来ファイル (AI 管理)
        #   - CHANGELOG.md, SECURITY.md — 上流由来ファイル
        #   - terraform/**/README.md — terraform-docs 自動生成
        exclude: |
          (?x)(
            ^client/package-lock\.json$
            | ^client/\.next/
            | ^client/cache/
            | ^docs/adr/.*\.md$
            | ^\.claude/
            | ^\.claude-plugin/
            | ^\.devcontainer/
            | ^\.vscode/
            | ^\.serena/
            | ^plugins/
            | ^examples/
            | ^scripts/.*\.ts$
            | ^\.github/workflows/(claude|backfill-duplicate-comments).*\.yml$
            | ^CHANGELOG\.md$
            | ^SECURITY\.md$
            | ^README\.md$
            | ^terraform/.*/README\.md$
          )

  # ESLint は client/ 配下のみに適用
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.11.1
    hooks:
      - id: eslint
        files: ^client/src/.*\.(js|jsx|ts|tsx)$
        additional_dependencies:
          - eslint@^8
          - eslint-config-next@14.1.4
          - eslint-config-prettier@^9.1.0
          - "@typescript-eslint/parser@^7"

  # --- Secrets scanning ---
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: |
          (?x)(
            ^client/package-lock\.json$
            | ^\.secrets\.baseline$
          )

  # --- Terraform ---
  # pre-commit での terraform_fmt / terraform_validate は F-17 (terraform CI 専用 PR) で
  # 再有効化する。それまでは CI 側 (.github/workflows/ci.yml の Terraform ジョブ) で
  # fmt/validate を実施する設計。
  # - 単体 module validate は provider/var 未解決で必ず落ちる (設計上の制約)
  # - CI ランナーに terraform バイナリを毎回 setup すると pre-commit キャッシュが
  #   効かず時間を食うため、別 job に分離した方が早い
  # - repo: https://github.com/antonbabenko/pre-commit-terraform
  #   rev: v1.96.1
  #   hooks:
  #     - id: terraform_fmt
  #       files: ^terraform/.*\.(tf|tfvars)$

  # --- Pytest local gate (pre-push only) ---
  # Disabled: this starts docker compose postgres/redis and runs the backend
  # pytest suite on every push. That is too heavy for low-memory local machines,
  # and CI already runs the backend pytest gate.
  #
  # To run it manually when needed:
  #   scripts/run-tests-local.sh
  #
  # - repo: local
  #   hooks:
  #     - id: pytest-local
  #       name: pytest local gate (apps/ + config/)
  #       entry: scripts/run-tests-local.sh
  #       language: system
  #       stages: [pre-push]
  #       pass_filenames: false
  #       always_run: true
