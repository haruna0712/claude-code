upstream api {
  server api:8000;
}

# Daphne (Channels ASGI) for WebSocket traffic. See P0-03.
upstream daphne {
  server daphne:8001;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream client {
  server client:3000;
}

server {
  listen 80;

  client_max_body_size 20M;

  error_log /var/log/nginx/error.log error;

  proxy_set_header Host $host;

  proxy_set_header X-Real-IP $remote_addr;

  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

  proxy_set_header X-Forwarded-Proto $scheme;

  proxy_http_version 1.1;

  proxy_set_header Upgrade $http_upgrade;

  proxy_set_header Connection $connection_upgrade;

  location /api/v1/ {
    proxy_pass http://api;
    access_log /var/log/nginx/api_access.log;
    error_log /var/log/nginx/api_error.log error;
  }

  # WebSocket traffic routed to Daphne (Channels). See P0-03.
  # Phase 3 (DM) / Phase 4A (notifications) の websocket endpoint 群を配信。
  location /ws/ {
    proxy_pass http://daphne;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    access_log /var/log/nginx/ws_access.log;
    error_log /var/log/nginx/ws_error.log error;
  }

  location /supersecret {
    proxy_pass http://api;
    access_log /var/log/nginx/admin_access.log;
  }

  location /redoc {
    proxy_pass http://api;
  }

  location /api/v1/auth/google {
    proxy_pass http://client/google;
  }

  location / {
    proxy_pass http://client;
  }

  location /static/ {
    alias /app/staticfiles/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";

  }
}
