name: CD stg

# main ブランチへの push で stg へデプロイ。
# 認証は IAM OIDC (terraform/modules/github_oidc で作成される Role)。
# 事前に GitHub repository の Variables に以下を設定 (settings -> Secrets and variables -> Actions -> Variables):
#   AWS_REGION              = ap-northeast-1
#   AWS_DEPLOY_ROLE_ARN     = <sns-stg-github-actions の role_arn>
#   ECR_BACKEND_REPOSITORY  = <account>.dkr.ecr.ap-northeast-1.amazonaws.com/sns-stg-backend
#   ECR_FRONTEND_REPOSITORY = <account>.dkr.ecr.ap-northeast-1.amazonaws.com/sns-stg-frontend
#   ECR_NGINX_REPOSITORY    = <account>.dkr.ecr.ap-northeast-1.amazonaws.com/sns-stg-nginx
#   ECS_CLUSTER             = sns-stg-cluster
#   SMOKE_URL               = https://stg.<your-domain>
# Secrets 側には機密が必要な場合のみ (現状は役立つ secret なし、Slack webhook を
# 追加する時に SLACK_WEBHOOK_URL を足す)。

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "デプロイする git SHA (省略時は HEAD)"
        required: false
        type: string

concurrency:
  group: cd-stg
  cancel-in-progress: false # main の連続 push を順番にデプロイ

# OIDC で sts:AssumeRoleWithWebIdentity を呼べるように
permissions:
  id-token: write # OIDC
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-1' }}
  IMAGE_TAG: stg-${{ github.event.inputs.image_tag || github.sha }}

jobs:
  # -----------------------------------------------------------------------
  # 1. Docker イメージをビルドして ECR へ push
  # -----------------------------------------------------------------------
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ env.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-cd-stg-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------- Backend (Django) ----------
      # buildcache tag に環境サフィックスを付けて、将来 CI (PR build) や
      # prod CD が同一 ECR リポジトリを使っても干渉しないようにする
      # (security-reviewer PR #58 MEDIUM)。
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/production/django/Dockerfile
          push: true
          tags: |
            ${{ vars.ECR_BACKEND_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ vars.ECR_BACKEND_REPOSITORY }}:stg-latest
          cache-from: type=registry,ref=${{ vars.ECR_BACKEND_REPOSITORY }}:buildcache-stg
          cache-to: type=registry,ref=${{ vars.ECR_BACKEND_REPOSITORY }}:buildcache-stg,mode=max
          provenance: false

      # ---------- Frontend (Next.js) ----------
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/docker/production/Dockerfile
          push: true
          tags: |
            ${{ vars.ECR_FRONTEND_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ vars.ECR_FRONTEND_REPOSITORY }}:stg-latest
          cache-from: type=registry,ref=${{ vars.ECR_FRONTEND_REPOSITORY }}:buildcache-stg
          cache-to: type=registry,ref=${{ vars.ECR_FRONTEND_REPOSITORY }}:buildcache-stg,mode=max
          provenance: false
          build-args: |
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_SENTRY_ENVIRONMENT=stg
            NEXT_PUBLIC_SENTRY_RELEASE=${{ env.IMAGE_TAG }}

      # ---------- Nginx ----------
      - name: Build & push nginx
        uses: docker/build-push-action@v6
        with:
          context: ./docker/production/nginx
          file: ./docker/production/nginx/Dockerfile
          push: true
          tags: |
            ${{ vars.ECR_NGINX_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ vars.ECR_NGINX_REPOSITORY }}:stg-latest
          cache-from: type=registry,ref=${{ vars.ECR_NGINX_REPOSITORY }}:buildcache-stg
          cache-to: type=registry,ref=${{ vars.ECR_NGINX_REPOSITORY }}:buildcache-stg,mode=max
          provenance: false

  # -----------------------------------------------------------------------
  # 2. DB マイグレーション (ECS run-task)
  # -----------------------------------------------------------------------
  migrate:
    name: Run migrations
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-cd-stg-migrate-${{ github.run_id }}

      # Phase 0.5 では django / celery の task definition がまだ ECS に登録
      # F1-2 (security-reviewer Phase 1 CRITICAL): placeholder を本実装に置換。
      # ECS task definition `sns-stg-django-migrate` (terraform 側で定義) を
      # `run-task` で起動して migration を流す。タスクが定義されていない環境
      # では `vars.ECS_MIGRATE_TASK_DEFINITION` 未設定で skip する (新規 stg /
      # 復旧フェーズ用)。
      - name: Run Django migrations on ECS
        if: vars.ECS_MIGRATE_TASK_DEFINITION != '' && vars.ECS_PRIVATE_SUBNETS != '' && vars.ECS_SECURITY_GROUP != ''
        env:
          CLUSTER: ${{ vars.ECS_CLUSTER }}
          TASK_DEF: ${{ vars.ECS_MIGRATE_TASK_DEFINITION }}
          SUBNETS: ${{ vars.ECS_PRIVATE_SUBNETS }}
          SECGROUP: ${{ vars.ECS_SECURITY_GROUP }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          set -euo pipefail
          # 直近の image tag を環境変数として container override で渡す。
          # 同一 task definition の中で migrate コンテナだけが該当する。
          task_arn=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SECGROUP],assignPublicIp=DISABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"django\",\"environment\":[{\"name\":\"IMAGE_TAG\",\"value\":\"$IMAGE_TAG\"}]}]}" \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "Migration task: $task_arn"
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$task_arn"
          # exit code を取得してジョブ成否に反映
          exit_code=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" \
            --tasks "$task_arn" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)
          if [ "$exit_code" != "0" ]; then
            echo "::error::Migration task exited with code $exit_code"
            aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$task_arn" \
              --query 'tasks[0].stoppedReason' --output text
            exit 1
          fi
          echo "Migration completed successfully"

      - name: Skip migration (ECS migrate task definition not configured)
        if: vars.ECS_MIGRATE_TASK_DEFINITION == ''
        run: |
          echo "::warning::ECS_MIGRATE_TASK_DEFINITION が未設定のため migration を skip。stg 初回 apply 後に GitHub Variables に登録すること。"

  # -----------------------------------------------------------------------
  # 3. ECS サービス更新 (Rolling Update)
  # -----------------------------------------------------------------------
  deploy:
    name: Update ECS services
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-cd-stg-deploy-${{ github.run_id }}

      # F1-2: ECS service rolling update を本実装。
      # 対象 service 一覧は env var `ECS_SERVICES` (カンマ区切り) で指定。
      # 例: "sns-stg-django,sns-stg-next,sns-stg-daphne,sns-stg-celery-worker,sns-stg-celery-beat"
      - name: Force new deployment on ECS services
        if: vars.ECS_CLUSTER != '' && vars.ECS_SERVICES != ''
        env:
          CLUSTER: ${{ vars.ECS_CLUSTER }}
          SERVICES: ${{ vars.ECS_SERVICES }}
        run: |
          set -euo pipefail
          IFS=',' read -ra SERVICE_LIST <<< "$SERVICES"
          for svc in "${SERVICE_LIST[@]}"; do
            svc="${svc// /}"  # trim spaces
            [ -z "$svc" ] && continue
            echo "Triggering rolling update on service: $svc"
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "$svc" \
              --force-new-deployment \
              --no-cli-pager > /dev/null
          done
          # Rolling update が steady state に到達するまで wait (最大 10 分)。
          # 5 サービス並列で wait しても AWS CLI が直列処理するので体感 5-8 min。
          for svc in "${SERVICE_LIST[@]}"; do
            svc="${svc// /}"
            [ -z "$svc" ] && continue
            echo "Waiting for $svc to be stable..."
            aws ecs wait services-stable --cluster "$CLUSTER" --services "$svc"
            echo "$svc is stable"
          done

      - name: Skip deploy (ECS services not configured)
        if: vars.ECS_CLUSTER == '' || vars.ECS_SERVICES == ''
        run: |
          echo "::warning::ECS_CLUSTER または ECS_SERVICES が未設定のためデプロイを skip。stg 初回 apply 後に GitHub Variables に登録すること。"

  # -----------------------------------------------------------------------
  # 4. Smoke test
  # -----------------------------------------------------------------------
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      # F1-2: continue-on-error を削除して smoke 失敗で job を fail させる。
      # SMOKE_URL 未設定の場合は明示的に skip する step を別建てにし、設定漏れと
      # 実行失敗を CI 上で区別できるようにする。
      - name: curl /api/health/
        if: vars.SMOKE_URL != ''
        run: |
          set -euo pipefail
          url="${{ vars.SMOKE_URL }}/api/health/"
          echo "Hitting $url"
          for i in 1 2 3 4 5; do
            if curl -fsSL --max-time 10 "$url" > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            echo "Attempt $i failed, retrying in 20s..."
            sleep 20
          done
          echo "::error::Health check failed after 5 attempts"
          exit 1

      - name: Skip smoke test (SMOKE_URL not configured)
        if: vars.SMOKE_URL == ''
        run: |
          echo "::warning::SMOKE_URL が未設定のため smoke を skip。stg 初回 apply + DNS 委任完了後に GitHub Variables に登録すること。"
      - name: Smoke test skipped notice
        if: vars.SMOKE_URL == ''
        run: |
          echo "::warning::SMOKE_URL is not set; skipping smoke test. Configure it in repo Variables before Phase 1."

  # -----------------------------------------------------------------------
  # 5. Sentry release
  # `secrets.SENTRY_AUTH_TOKEN` は `if:` 内で参照できないため、設定済みか
  # どうかは Variables 側 (`vars.SENTRY_ORG`) で判定する
  # (security-reviewer PR #58 LOW)。vars.SENTRY_ORG を入れる運用 =
  # Sentry 連携を有効化する運用、という合意で揃える。
  # -----------------------------------------------------------------------
  sentry-release:
    name: Sentry release
    runs-on: ubuntu-latest
    needs: smoke-test
    if: vars.SENTRY_ORG != ''
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
    steps:
      - uses: actions/checkout@v4
      # サードパーティ Action は SHA pin で供給元の書換え攻撃を防ぐ
      # (security-reviewer PR #58 MEDIUM)。バージョン注釈のコメントを併記。
      - name: Create Sentry release
        uses: getsentry/action-release@586b62368a1c6b5dffb12d55a1a7edfd2263ad3c # v1.7.0
        with:
          environment: stg
          version: ${{ env.IMAGE_TAG }}
          ignore_missing: true
